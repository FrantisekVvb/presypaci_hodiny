<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Měření času</title>
  <link rel="stylesheet" href="styles.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/lottie-web/5.12.2/lottie.min.js"></script>
  <script src="main.js" defer></script>
</head>
<body>
  <nav class="mode-switch" aria-label="Režim aplikace">
    <button type="button" class="mode-switch__btn is-active" data-mode="hourglass">Přesýpací hodiny</button>
    <button type="button" class="mode-switch__btn" data-mode="stopwatch">Stopky</button>
  </nav>

  <div class="stage stage--hourglass">
    <div class="hourglass-unit hourglass-unit--xlarge">
      <div class="lottie"></div>
      <button class="flip-btn" type="button" aria-label="Otočit hodiny">↻</button>
    </div>
    <div class="hourglass-unit hourglass-unit--large">
      <div class="lottie"></div>
      <button class="flip-btn" type="button" aria-label="Otočit hodiny">↻</button>
    </div>
    <div class="hourglass-unit hourglass-unit--small">
      <div class="lottie"></div>
      <button class="flip-btn" type="button" aria-label="Otočit hodiny">↻</button>
    </div>
  </div>

  <div class="stage stage--stopwatch hidden">
    <div class="stopwatch" id="stopwatch"></div>
  </div>
</body>
</html>
